<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Themes</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Discord-like sidebar -->
  <div class="settings-layout">
    <aside class="sidebar">
      <div class="sidebar-section">USER SETTINGS</div>
      <a class="sidebar-item">My Account</a>
      <a class="sidebar-item">Profiles</a>
      <a class="sidebar-item">Privacy & Safety</a>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">APP SETTINGS</div>
      <a class="sidebar-item">Appearance</a>
      <a class="sidebar-item">Accessibility</a>
      <a class="sidebar-item">Voice & Video</a>
      <div class="sidebar-divider"></div>
      <div class="sidebar-section">VENCORD</div>
      <a class="sidebar-item">Vencord</a>
      <a class="sidebar-item">Plugins</a>
      <a class="sidebar-item active">Themes</a>
      <a class="sidebar-item">Updater</a>
    </aside>

    <!-- Main content -->
    <main class="content">
      <div class="content-header">
        <div>
          <h1>Themes</h1>
          <p class="subtitle">Discover and install themes for your Discord client.</p>
        </div>
        <div class="header-actions">
          <input class="search" type="text" placeholder="Search themes..." oninput="filterThemes(this.value)"/>
        </div>
      </div>

      <div class="tab-row">
        <button class="tab active" onclick="switchTab('online', this)">Online</button>
        <button class="tab" onclick="switchTab('installed', this)">Installed</button>
      </div>

      <!-- Online themes grid -->
      <div id="online" class="themes-grid"></div>

      <!-- Installed themes -->
      <div id="installed" class="themes-grid hidden"></div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast hidden" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
